<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./src/style.css" rel="stylesheet" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="./src/script.js" defer></script>
    <title>Skroutz Calculator v2</title>
  </head>
  <body
    class="flex flex-col items-center justify-center w-full lg:overflow-hidden md:h-screen bg-slate-200"
  >
    <h1 class="mt-10 mb-8 text-3xl font-bold text-center lg:mt-0">
      <span class="text-orange-500">Skroutz</span> Profit Calculator
      <span class="text-orange-500">v2.0</span>
    </h1>
    <div
      class="container flex flex-col-reverse items-center justify-center gap-4 p-4 md:flex-row"
    >
      <div
        class="bg-gray-700 part1 w-full max-w-[500px] h-full p-10 flex flex-col justify-center items-center rounded-2xl shadow-2xl"
      >
        <h2 class="text-4xl font-semibold text-white">Profit</h2>
        <span
          class="p-4 px-10 my-8 text-3xl text-white border-2 border-orange-500 border-solid rounded-md"
          id="profit"
          >0</span
        >
        <p class="error"></p>
        <div class="flex gap-8 mt-4 part1-btn">
          <button
            class="p-4 text-2xl font-bold text-white bg-red-600 rounded-lg hover:opacity-90"
            id="btn_reset"
          >
            Reset
          </button>
          <button
            class="p-4 text-2xl font-bold text-white bg-orange-600 rounded-lg hover:opacity-90"
            id="btn_calc"
          >
            Calculate
          </button>
        </div>
        <div class="mt-8 text-lg">
          <a
            href="./skroutz-fees-without-ads.html"
            target="_blank"
            class="italic font-bold text-orange-400"
          >
            Skroutz Fees (Without Ads) &nbsp;
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </a>
        </div>
        <div class="mt-2 text-lg">
          <a
            href="./skroutz-fees-with-ads.html"
            target="_blank"
            class="italic font-bold text-orange-400"
          >
            Skroutz Fees (With Ads) &nbsp;
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </a>
        </div>
        <div class="mt-2 text-lg">
          <a
            href="https://workspace-iota-peach.vercel.app/"
            target="_blank"
            rel="noopener noreferrer"
            class="italic font-bold text-orange-400"
          >
            SEO Generator &nbsp;
            <i class="fa-solid fa-arrow-up-right-from-square"></i>
          </a>
        </div>
      </div>

      <div
        class="bg-gray-700 part2 w-full max-w-[600px] h-full p-10 flex flex-col justify-center items-center rounded-2xl shadow-2xl"
      >
        <h2
          class="p-4 text-4xl font-semibold text-white border-orange-400 border-b-[1px] mb-4 text-center"
        >
          <span class="text-orange-500">Skroutz</span> Calculator
        </h2>

        <div class="w-full myForm">
          <form id="form" class="w-full">
            <div
              class="calculator-row flex flex-col items-center justify-evenly tim__agoras lg:flex-row"
            >
              <div
                class="calculator-label-group flex flex-col gap-3 items-center lg:items-start"
              >
                <label class="my-4 text-lg text-white lg:my-0 lg:text-[1rem]">
                  Τιμ. Αγορας (Χωρις ΦΠΑ):
                </label>
              </div>
              <div class="calculator-control-group">
                <input
                  type="number"
                  placeholder="Τιμη Αγορας"
                  class="w-full p-4 text-center rounded-lg lg:p-2 lg:py-4"
                  id="agora"
                />
              </div>
            </div>
            <div class="line border-orange-400 border-t-[1px] my-4"></div>
            <div
              class="calculator-row flex flex-col items-center justify-evenly tim__lianikis lg:flex-row"
            >
              <div
                class="calculator-label-group flex flex-col gap-3 items-center lg:items-start"
              >
                <label class="my-4 text-lg text-white lg:my-0 lg:text-[1rem]">
                  Τιμ. Λιανικης (Με ΦΠΑ) :
                </label>
              </div>
              <div class="calculator-control-group">
                <input
                  type="number"
                  placeholder="Τιμη Αγορας"
                  class="w-full p-4 text-center rounded-lg lg:p-2 lg:py-4"
                  id="lianiki"
                />
              </div>
            </div>
            <div class="line border-orange-400 border-t-[1px] my-4"></div>
            <div
              class="calculator-row flex flex-col items-center justify-evenly pososto__skroutz lg:flex-row"
            >
              <div
                class="calculator-label-group flex flex-col gap-3 items-center lg:items-start"
              >
                <label class="my-4 text-lg text-white lg:my-0 lg:text-[1rem]">
                  Ποσοστο % Skroutz
                </label>
                <label
                  for="ads-toggle"
                  class="inline-flex items-center gap-2 text-white text-sm"
                >
                  <input
                    type="checkbox"
                    id="ads-toggle"
                    class="w-4 h-4 text-orange-500 bg-white border rounded focus:ring-orange-400 focus:ring-2"
                  />
                  With Ads
                </label>
              </div>
              <div class="calculator-control-group">
                <select
                  name=""
                  id="pososto"
                  class="w-full p-4 text-center rounded-lg"
                  required
                ></select>
              </div>
            </div>

            <div
              class="calculator-row flex flex-col items-center mt-4 justify-evenly pososto__skroutz lg:flex-row"
            >
              <div
                class="calculator-label-group flex flex-col gap-3 items-center lg:items-start"
              >
                <label
                  class="my-4 text-lg text-white lg:my-0 lg:text-[1rem] text-center"
                >
                  Διαχειριστικό κόστος
                </label>
                <label
                  for="coins-toggle"
                  class="inline-flex items-center gap-2 text-white text-sm"
                >
                  <input
                    type="checkbox"
                    id="coins-toggle"
                    class="w-4 h-4 text-orange-500 bg-white border rounded focus:ring-orange-400 focus:ring-2"
                    checked
                  />
                  With Coins
                </label>
              </div>
              <div class="calculator-control-stack">
                <select
                  name=""
                  id="fulfilled"
                  class="w-full p-4 text-center rounded-lg"
                  required
                ></select>
                <button
                  type="button"
                  id="fulfilled-auto-toggle"
                  class="w-full px-4 py-2 text-sm font-bold text-white bg-orange-600 rounded-lg hover:opacity-90"
                >
                  Auto change: ON
                </button>
              </div>
            </div>

            <div
              class="flex flex-col items-center mt-4 justify-evenly lg:flex-row"
            >
              <label class="my-4 text-lg text-white lg:my-0 lg:text-[1rem]">
                2 Deals:
              </label>
              <div class="flex items-center">
                <input
                  id="checked-checkbox"
                  type="checkbox"
                  value=""
                  class="w-4 h-4 text-orange-500 rounded cursor-pointer focus:ring-orange-400 focus:ring-2"
                />
                <label
                  for="checked-checkbox"
                  class="ml-4 text-lg text-white cursor-pointer"
                >
                  -5% for 3+ Items</label
                >
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
